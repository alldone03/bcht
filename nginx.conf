user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Rate Limit Zones Definition
    limit_req_zone $binary_remote_addr zone=backend_ip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=frontend_ip:10m rate=10r/s;

    # ===============================
    # HTTP Redirect to HTTPS & ACME
    # ===============================
    server {
        listen 80;
        server_name patriot.insamo.id;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===============================
    # HTTPS : patriot.insamo.id
    # ===============================
    server {
        listen 443 ssl;
        server_name patriot.insamo.id;

        ssl_certificate /etc/letsencrypt/live/patriot.insamo.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/patriot.insamo.id/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        resolver 127.0.0.11 valid=30s;

        location /api/ {
            limit_req zone=backend_ip burst=60 nodelay;
            set $backend_url http://backend:8000;
            proxy_pass $backend_url;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            client_max_body_size 10M;
            error_page 429 = @backend_rate_limited;
        }

        location /ws {
            set $websocket_url http://websocket:6001;
            proxy_pass $websocket_url;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }

        location / {
            limit_req zone=frontend_ip burst=60 nodelay;
            set $frontend_url http://frontend:80;
            proxy_pass $frontend_url;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            error_page 429 = @frontend_rate_limited;
        }

        location @frontend_rate_limited {
            default_type text/plain;
            return 429 "Too many requests. Please slow down.\n";
        }
        location @backend_rate_limited {
            default_type text/plain;
            return 429 "Too many requests. Please slow down.\n";
        }
    }
}
