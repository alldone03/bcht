version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: patriot_db_prod
    restart: always
    environment:
      TZ: Asia/Jakarta
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    # ports:
    #   - "3306:3306"
    volumes:
      - dbdata-prod:/var/lib/mysql
    networks:
      - patriot-prod-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: patriot_redis_prod
    restart: always
    environment:
      TZ: Asia/Jakarta
    networks:
      - patriot-prod-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: patriot_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      TZ: Asia/Jakarta
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      WEBSOCKET_BROADCAST_URL: http://websocket:6001/broadcast
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - patriot-prod-network

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: patriot_queue_worker_prod
    restart: always
    command: sh -c "until nc -z db 3306; do echo 'Waiting for database...'; sleep 1; done && php artisan queue:work"
    env_file:
      - .env
    environment:
      TZ: Asia/Jakarta
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      WEBSOCKET_BROADCAST_URL: http://websocket:6001/broadcast
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - patriot-prod-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=https://project.insamo.id/patriot/api
        - VITE_WS_URL=wss://project.insamo.id/patriot/ws
    container_name: patriot_frontend_prod
    restart: always
    # ports:
    #   - "80:80"
    environment:
      TZ: Asia/Jakarta
    depends_on:
      - backend
    networks:
      - patriot-prod-network
      - web

  websocket:
    image: node:18-alpine
    container_name: patriot_websocket_prod
    restart: always
    volumes:
      - ./backend:/app
    working_dir: /app
    command: node websocket-server.js
    networks:
      - patriot-prod-network
      - web

networks:
  patriot-prod-network:
    driver: bridge
  web:
    external: true

volumes:
  dbdata-prod:
    driver: local
